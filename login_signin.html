<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입/로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <style>
        :root {
          --bg-primary: #121212;
          --bg-secondary: #1e1e1e;
          --bg-tertiary: #2d2d2d;
          --text-primary: #ffffff;
          --text-secondary: #e0e0e0;
          --text-tertiary: #a0a0a0;
          --accent-primary: #00b0ff;
          --accent-secondary: #64ffda;
          --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
          --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        * {
          box-sizing: border-box;
        }
        
        body {
          font-family: "Montserrat", sans-serif;
          margin: 0;
          padding: 0;
        }
        
        .wrapper {
          width: 100%;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: var(--bg-primary);
          overflow: hidden;
        }
        
        .container {
          border-radius: 10px;
          box-shadow: var(--shadow);
          position: relative;
          width: 500px;
          min-height: 600px;
          overflow: hidden;
          background: var(--bg-secondary);
        }
        
        form {
          background: var(--bg-secondary);
          display: flex;
          flex-direction: column;
          padding: 40px;
          height: 100%;
          width: 100%;
          justify-content: center;
          align-items: center;
        }
        
        form input {
          background: var(--bg-tertiary);
          padding: 16px;
          margin: 12px 0;
          width: 100%;
          border: 0;
          outline: none;
          border-radius: 20px;
          box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
          color: var(--text-primary);
          font-size: 14px;
        }
        
        button {
          border-radius: 20px;
          border: none;
          outline: none;
          font-size: 14px;
          font-weight: bold;
          padding: 15px 45px;
          margin: 20px 0;
          letter-spacing: 1px;
          text-transform: uppercase;
          cursor: pointer;
          transition: var(--transition);
          width: 100%;
        }
        
        .form_btn {
          background-color: var(--accent-primary);
          color: var(--text-primary);
          box-shadow: var(--shadow);
        }
        
        .form_btn:active {
          box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
          transform: translateY(2px);
        }
        
        .switch_btn {
          background-color: transparent;
          color: var(--text-secondary);
          border: 1px solid var(--text-tertiary);
          margin-top: 10px;
        }
        
        .switch_btn:hover {
          background-color: var(--bg-tertiary);
        }
        
        .sign-in-container {
          position: absolute;
          top: 0;
          width: 100%;
          height: 100%;
          transition: var(--transition);
        }
        
        .sign-up-container {
          position: absolute;
          top: 0;
          width: 100%;
          height: 100%;
          opacity: 0;
          transform: translateY(-100%);
          transition: var(--transition);
        }
        
        .container.sign-up-active .sign-in-container {
          transform: translateY(100%);
          opacity: 0;
        }
        
        .container.sign-up-active .sign-up-container {
          transform: translateY(0);
          opacity: 1;
        }
        
        form h1 {
          font-weight: bold;
          margin: 0 0 20px 0;
          color: var(--text-primary);
          font-size: 28px;
        }
        
        p {
          font-size: 16px;
          font-weight: normal;
          letter-spacing: 0.5px;
          margin: 20px 0 30px;
          color: var(--text-secondary);
          text-align: center;
        }
        
        span {
          font-size: 14px;
          color: var(--text-tertiary);
          letter-spacing: 0.5px;
          margin-bottom: 15px;
        }
        
        .social-links {
          margin: 20px 0;
          display: flex;
          justify-content: center;
        }
        
        .social-links div {
          width: 40px;
          height: 40px;
          display: inline-flex;
          justify-content: center;
          align-items: center;
          margin: 0 8px;
          border-radius: 50%;
          box-shadow: var(--shadow);
          cursor: pointer;
          background-color: var(--bg-tertiary);
        }
        
        .social-links a {
          color: var(--text-primary);
        }
        
        .social-links div:active {
          box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="sign-up-container">
                <form>
                    <h1>회원 가입</h1>
                    <span>가입을 위해 이메일을 등록하세요</span>
                    <input type="text" placeholder="이름">
                    <input type="email" placeholder="이메일">
                    <input type="password" placeholder="비밀번호">
                    <button class="form_btn">회원 가입</button>
                    <p>이미 계정이 있으신가요?</p>
                    <button id="switchToSignIn" class="switch_btn">로그인하기</button>
                </form>
            </div>
            <div class="sign-in-container">
                <form>
                    <h1>로그인</h1>
                    <span>이메일을 입력하세요</span>
                    <input type="email" placeholder="이메일">
                    <input type="password" placeholder="비밀번호">
                    <button class="form_btn">로그인</button>
                    <p>아직 계정이 없으신가요?</p>
                    <button id="switchToSignUp" class="switch_btn">회원가입하기</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const switchToSignUpBtn = document.getElementById("switchToSignUp");
        const switchToSignInBtn = document.getElementById("switchToSignIn");
        const container = document.querySelector(".container");
        
        switchToSignUpBtn.addEventListener("click", (e) => {
            e.preventDefault();
            container.classList.add("sign-up-active");
        });
        
        switchToSignInBtn.addEventListener("click", (e) => {
            e.preventDefault();
            container.classList.remove("sign-up-active");
        });
    </script>
</body>
</html>
