<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 요약 봇</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-tertiary: #a0a0a0;
            --accent-primary: #00b0ff;
            --accent-secondary: #64ffda;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
                
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            overflow-y: auto; /* 스크롤 허용 */
        }
        
        .header {
            padding: 1rem 2rem;
            background-color: var(--bg-secondary);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: var(--accent-primary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .header h1 i {
            margin-right: 0.5rem;
            font-size: 1.8rem;
        }
        
        .header h1:hover {
            transform: translateY(-2px);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            color: var(--text-tertiary);
        }
        
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            height: calc(100vh - 70px);
            position: relative;
            transition: var(--transition);
            overflow-y: auto; /* 이 줄 추가 */
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-primary) var(--bg-secondary);
            transition: var(--transition);
        }
        
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-container::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background-color: var(--accent-primary);
            border-radius: 3px;
        }
        
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 90vh; /* 이 줄만 추가 - 스크롤 가능하도록 함 */
            text-align: center;
            margin-bottom: 30px;
            padding: 0 2rem;
            transition: var(--transition);
            animation: fadeIn 1s ease;
        }
        
        .welcome-logo {
            font-size: 3.5rem;
            color: var(--accent-primary);
            margin-bottom: 1.5rem;
            animation: pulse 3s infinite alternate;
        }
        
        .welcome-title {
            font-size: 2.2rem;
            margin-bottom: 5rem;
            color: var(--accent-primary);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .welcome-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            line-height: 1.6;
            max-width: 600px;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 2rem;
            gap: 0.5rem;
        }
        
        .tag {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            transform: scale(0.95);
            animation: fadeInUp 0.6s calc(var(--delay) * 0.1s) both;
        }
        
        .tag:hover {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
            transform: scale(1.05);
        }
        
        .input-container {
            display: flex;
            margin-top: auto;
            position: relative;
            transition: var(--transition);
        }
        
        .center-input {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .articleText {
            flex: 1;
            padding: 1rem 3rem 1rem 1rem;
            border: 1px solid var(--bg-tertiary);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            color: var(--text-primary);
            background-color: var(--bg-secondary);
            box-shadow: var(--shadow);
            resize: none;
            min-height: 56px;
            max-height: 200px;
            transition: var(--transition);
            overflow: hidden;
        }
        
        .articleText::placeholder {
            color: var(--text-tertiary);
        }
        
        .articleText:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(0, 176, 255, 0.2);
        }
        
        .send-button {
            position: absolute;
            right: 10px;
            bottom: 10px;
            background-color: var(--accent-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .send-button:hover {
            background-color: var(--accent-secondary);
            transform: rotate(15deg) scale(1.1);
        }
        
        .message {
            display: flex;
            margin-bottom: 1.5rem;
            position: relative;
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .message-content {
            padding: 1rem;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.5;
            transition: var(--transition);
        }
        
        .user-message {
            justify-content: flex-end;
        }
        
        .bot-message {
            justify-content: flex-start;
        }
        
        .user-message .message-content {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
            box-shadow: var(--shadow);
        }
        
        .bot-message .message-content {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }
        
        .user-message .message-content:hover,
        .bot-message .message-content:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-weight: bold;
            animation: scaleIn 0.3s ease;
        }
        
        .bot-avatar {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            box-shadow: var(--shadow);
        }
        
        .typing-indicator {
            display: flex;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            background-color: var(--bg-tertiary);
            width: fit-content;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            margin: 2px 2px;
            border-radius: 50%;
            background-color: var(--accent-primary);
            display: inline-block;
            animation: typingDot 1.5s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        .category-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            transition: var(--transition);
        }
        
        .category-chip {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 0.3rem 0.8rem;
            border-radius: 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            animation: fadeInRight 0.5s calc(var(--delay) * 0.1s) both;
        }
        
        .category-chip:hover {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
            transform: translateY(-2px);
        }
        
        .category-chip.active {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
        }
        
        /* 애니메이션 */
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInRight {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                text-shadow: 0 0 10px rgba(0, 176, 255, 0.5);
            }
            100% {
                transform: scale(1.05);
                text-shadow: 0 0 20px rgba(0, 176, 255, 0.8);
            }
        }
        
        @keyframes scaleIn {
            0% {
                transform: scale(0);
            }
            70% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        
        @keyframes typingDot {
            0%, 20%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
        
        /* 반응형 디자인 */
        @media (max-width: 768px) {
            .header {
                padding: 0.8rem 1rem;
            }
            
            .main-container {
                padding: 0.5rem;
            }
            
            .message-content {
                max-width: 90%;
            }
            
            .welcome-title {
                font-size: 1.8rem;
            }
            
            .welcome-logo {
                font-size: 3rem;
            }
        }



        /* 뉴스 추천 섹션 스타일 */
        .news-recommendations {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-primary);
            padding: 2rem 1rem;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .news-recommendations.visible {
            opacity: 1;
        }

        .recommendations-title {
            text-align: center;
            color: var(--accent-primary);
            font-size: 1.8rem;
            margin-bottom: 2rem;
            animation: fadeIn 1s ease;
        }

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .news-category {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.6s calc(var(--delay) * 0.15s) both;
        }

        .news-category:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .category-title {
            color: var(--accent-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .news-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-primary) var(--bg-secondary);
        }

        .news-items::-webkit-scrollbar {
            width: 4px;
        }

        .news-items::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .news-items::-webkit-scrollbar-thumb {
            background-color: var(--accent-primary);
            border-radius: 3px;
        }

        .news-item {
            background-color: var(--bg-tertiary);
            border-radius: 8px;
            padding: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .news-item:hover {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        .news-item-title {
            font-weight: bold;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        .news-item-summary {
            font-size: 0.8rem;
            color: var(--text-secondary);
            max-height: 2.6em; /* 2줄 높이 (line-height 1.3 * 2) */
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
            position: relative;
        }

        /* 여러 줄 말줄임표 효과 적용 */
        .news-item-summary::after {
            content: '...';
            position: absolute;
            right: 0;
            bottom: 0;
            padding-left: 3px;
            background-color: var(--bg-tertiary);
        }

        .news-item:hover .news-item-summary::after {
            background-color: var(--accent-primary);
        }

        .news-item:hover .news-item-summary {
            color: var(--bg-secondary);
        }

        /* 스크롤 인디케이터 스타일 */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            animation: bounce 2s infinite;
        }

        .arrow-down {
            margin-top: 8px;
            font-size: 1.2rem;
            color: var(--accent-primary);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        /* 반응형 디자인 업데이트 */
        @media (max-width: 992px) {
            .recommendations-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .recommendations-grid {
                grid-template-columns: 1fr;
            }
            
            .news-category {
                min-height: 250px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 id="title-home"><i class="fas fa-newspaper"></i> 뉴스 요약 봇</h1>
        <div class="header-right">
            <span id="date-display"></span>
        </div>
    </header>
    
    <div class="main-container">
        <div id="category-container" class="category-chips" style="display: none;">
            <div class="category-chip active" style="--delay: 1;">전체</div>
            <div class="category-chip" style="--delay: 2;">정치</div>
            <div class="category-chip" style="--delay: 3;">경제</div>
            <div class="category-chip" style="--delay: 4;">사회</div>
            <div class="category-chip" style="--delay: 5;">국제</div>
            <div class="category-chip" style="--delay: 6;">기술</div>
            <div class="category-chip" style="--delay: 7;">문화</div>
        </div>
        
        <div id="welcome-view" class="welcome-container">
            <div class="welcome-logo">
                <i class="fas fa-newspaper"></i>
            </div>
            <h2 class="welcome-title">뉴스 요약 봇</h2>
            <p class="welcome-subtitle">궁금한 뉴스나 주제를 입력하시면 AI가 빠르게 요약해 드립니다.<br>최신 이슈를 간편하게 파악하세요.</p>
            
            <div class="tags-container">
                <div class="tag" style="--delay: 1;">대선 결과</div>
                <div class="tag" style="--delay: 2;">최신 경제 동향</div>
                <div class="tag" style="--delay: 3;">코로나19 현황</div>
                <div class="tag" style="--delay: 4;">기후 변화</div>
                <div class="tag" style="--delay: 5;">테크 트렌드</div>
                <div class="tag" style="--delay: 6;">글로벌 이슈</div>
            </div>


            <!-- welcome-view 내부 tags-container 다음에 추가 -->
            <div class="scroll-indicator">
                <p>뉴스 추천 페이지</p>
                <div class="arrow-down">
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <div id="chat-view" class="chat-container" style="display: none;"></div>


        <!-- welcome-view와 chat-view 다음, input-container 전에 추가 -->
        <div id="news-recommendations" class="news-recommendations" style="display: none;">
            <h2 class="recommendations-title">오늘의 추천 뉴스</h2>
            <div class="recommendations-grid">
                <div class="news-category" data-category="정치">
                    <h3 class="category-title">정치</h3>
                    <div class="news-items"></div>
                </div>
                <div class="news-category" data-category="경제">
                    <h3 class="category-title">경제</h3>
                    <div class="news-items"></div>
                </div>
                <div class="news-category" data-category="사회">
                    <h3 class="category-title">사회</h3>
                    <div class="news-items"></div>
                </div>
                <div class="news-category" data-category="국제">
                    <h3 class="category-title">국제</h3>
                    <div class="news-items"></div>
                </div>
                <div class="news-category" data-category="기술/IT">
                    <h3 class="category-title">기술/IT</h3>
                    <div class="news-items"></div>
                </div>
                <div class="news-category" data-category="예술">
                    <h3 class="category-title">예술</h3>
                    <div class="news-items"></div>
                </div>
            </div>
        </div>


        
        <div id="input-container" class="input-container center-input" contenteditable="true">
            <textarea id="articleText" class="articleText" placeholder="뉴스 주제나 URL을 입력하세요..." rows="1"></textarea>
            <button id="send-button" class="send-button" onclick="sendArticle()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
    
    <script>
        const state = {
            sendingMessage: false,
            typingIndicator: null,
            messages: [],
            hasConversationStarted: false
        };

        // 현재 날짜 표시
        function displayDate() {
            const date = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date-display').textContent = date.toLocaleDateString('ko-KR', options);
        }

        // 텍스트 영역 자동 높이 조절
        function autoResizeTextarea() {
            const textarea = document.getElementById('articleText');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                if (this.scrollHeight > 200) {
                    this.style.height = '200px';
                }
            });
            
            textarea.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            textarea.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });

            textarea.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendArticle();
                }
            });
        }

        // 메시지 추가 함수
        function addMessage(isUser, content, isFollowUp = false) {
            const chatView = document.getElementById('chat-view');
            const welcomeView = document.getElementById('welcome-view');
            const inputContainer = document.getElementById('input-container');
            const categoryContainer = document.getElementById('category-container');
            
            // 첫 메시지면 환영 화면 숨기고 채팅 화면 표시
            if (chatView.style.display === 'none') {
                welcomeView.style.display = 'none';
                chatView.style.display = 'flex';
                categoryContainer.style.display = 'flex';
                inputContainer.classList.remove('center-input');
                state.hasConversationStarted = true;
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            if (!isUser && !isFollowUp) {
                const avatar = document.createElement('div');
                avatar.className = 'avatar bot-avatar';
                avatar.innerHTML = '<i class="fas fa-robot"></i>';
                messageDiv.appendChild(avatar);
            } else if (!isUser && isFollowUp) {
                messageDiv.style.marginLeft = '52px';
            }
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;
            messageDiv.appendChild(messageContent);
            
            chatView.appendChild(messageDiv);
            
            // 지연 후 애니메이션 시작
            setTimeout(() => {
                messageDiv.style.animation = 'slideIn 0.5s ease-out forwards';
            }, 100);
            
            // 스크롤 부드럽게 아래로 이동
            setTimeout(() => {
                chatView.scrollTo({
                    top: chatView.scrollHeight,
                    behavior: 'smooth'
                });
            }, 200);

            // 상태 업데이트
            state.messages.push({
                content: content,
                isUser: isUser
            });
        }

        // 타이핑 인디케이터 표시 함수
        function showTypingIndicator() {
            const chatView = document.getElementById('chat-view');
            const typingDiv = document.createElement('div');

            const typingContent = document.createElement('div');
            typingContent.className = 'typing-indicator';
            typingContent.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

        function addCustomStyles() {
            const style = document.createElement('style');
            style.textContent = `
                .message {
                    margin-bottom: 0.5rem; /* 메시지 간격 줄이기 (원래 1.5rem) */
                }
                
                .bot-message + .bot-message {
                    margin-top: -0.3rem; /* 연속된 봇 메시지 간 더 좁은 간격 */
                }
            `;
            document.head.appendChild(style);
        }

        async function sendArticle() {
            const articleText = document.getElementById('articleText').value;
            if (!articleText.trim()) return;

            // 사용자 메시지 표시
            addMessage(true, articleText);
            document.getElementById('articleText').value = '';
            document.getElementById('articleText').style.height = 'auto';

            const typingIndicator = showTypingIndicator();

            try {
                // ✅ CSRF 토큰과 헤더 이름 가져오기
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

                // ✅ fetch 요청에 CSRF 토큰 포함
                const response = await fetch('/api/summaries', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken  // 동적으로 CSRF 헤더 키 사용
                    },
                    body: JSON.stringify({ text: articleText })
                });

                const data = await response.json();
                console.log("요약 응답:", data);

                if (typingIndicator && typingIndicator.parentNode) {
                    typingIndicator.parentNode.removeChild(typingIndicator);
                }

                if (!response.ok) {
                    throw new Error(data.message || '요약 요청 중 오류 발생');
                }

                conversation.push({ prompt: articleText, response: data.summary });

                let summary = data.summary;

                // 따옴표 제거
                summary = summary.replace(/[""]/g, '');

                // **로 둘러싸인 내용 제거 (** 포함)
                summary = summary.replace(/\*\*.*?\*\*/g, '');

                // 단락 나누기 (\n\n 기준)
                const paragraphs = summary.split(/\n+/);

                paragraphs.forEach((paragraph, index) => {
                    if (paragraph.trim()) {
                        addMessage(false, paragraph.trim(), index > 0); // index > 0이면 이어지는 메시지
                    }
                });

            } catch (error) {
                console.error('Error:', error);

                if (typingIndicator && typingIndicator.parentNode) {
                    typingIndicator.parentNode.removeChild(typingIndicator);
                }

                addMessage(false, '요약 중 오류가 발생했습니다: ' + error.message);
            }
        }

        function updateConversation() {
            conversation.forEach(entry => {
                addMessage(true, entry.prompt);
                addMessage(false, entry.response);
            });
        }

        // 뉴스 추천 섹션 초기화
        function initNewsRecommendations() {
            const categories = document.querySelectorAll('.news-category');
            
            categories.forEach((category, index) => {
                category.style.setProperty('--delay', index + 1);
                const categoryName = category.dataset.category;
                const newsItems = category.querySelector('.news-items');
                
                // 더미 뉴스 데이터 추가
                if (dummyNews[categoryName]) {
                    dummyNews[categoryName].forEach(news => {
                        const newsItem = document.createElement('div');
                        newsItem.className = 'news-item';
                        newsItem.innerHTML = `
                            <div class="news-item-title">${news.title}</div>
                            <div class="news-item-summary">${news.summary}</div>
                        `;
                        
                        // 뉴스 아이템 클릭 시 해당 내용을 입력창에 자동 입력
                        newsItem.addEventListener('click', () => {
                            document.getElementById('articleText').value = news.title;
                            toggleNewsRecommendations(false);
                            setTimeout(() => {
                                sendArticle();
                            }, 300);
                        });
                        
                        newsItems.appendChild(newsItem);
                    });
                }
            });
        }

        // 스크롤 처리 설정
        function setupScrollHandling() {
            let isNewsVisible = false;
            let isTransitioning = false; // 전환 중인지 추적하는 플래그 추가
            const welcomeView = document.getElementById('welcome-view');
            const newsRecommendations = document.getElementById('news-recommendations');
            
            // 스크롤 이벤트 디바운싱을 위한 변수
            let scrollTimeout;
            
            window.addEventListener('scroll', function() {
                // 이미 전환 중이면 무시
                if (isTransitioning) return;
                
                // 디바운싱 적용
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(function() {
                    // state 객체가 없거나 hasConversationStarted가 false일 때만 동작
                    if (!state || !state.hasConversationStarted) {
                        // 임계값을 더 멀리 설정 (100px -> 200px, 50px -> 20px)
                        if (window.scrollY > 20 && !isNewsVisible) {
                            isTransitioning = true; // 전환 시작
                            console.log('뉴스 추천 표시');
                            toggleNewsRecommendations(true);
                            isNewsVisible = true;
                            
                            // 전환 완료 후 플래그 리셋
                            setTimeout(() => {
                                isTransitioning = false;
                            }, 600); // 애니메이션 완료 시간보다 길게
                            
                        } else if (window.scrollY < 20 && isNewsVisible) {
                            isTransitioning = true; // 전환 시작
                            console.log('뉴스 추천 숨김');
                            toggleNewsRecommendations(false);
                            isNewsVisible = false;
                            
                            // 전환 완료 후 플래그 리셋
                            setTimeout(() => {
                                isTransitioning = false;
                            }, 600); // 애니메이션 완료 시간보다 길게
                        }
                    }
                }, 100); // 100ms 디바운싱
            });
        }

        // 뉴스 추천 화면 토글
        function toggleNewsRecommendations(show) {
            const welcomeView = document.getElementById('welcome-view');
            const newsRecommendations = document.getElementById('news-recommendations');
            const inputContainer = document.getElementById('input-container');
            
            console.log('토글 함수 실행:', show); // 디버깅용
            
            if (show) {
                // 환영 화면 숨기기
                welcomeView.style.opacity = '0';
                setTimeout(() => {
                    welcomeView.style.display = 'none';
                    
                    // 뉴스 추천 화면 표시
                    newsRecommendations.style.display = 'block';
                    document.body.style.overflow = 'auto'; // 스크롤 허용
                    
                    setTimeout(() => {
                        newsRecommendations.classList.add('visible');
                    }, 50);
                }, 300);
            } else {
                // 뉴스 추천 화면 숨기기
                newsRecommendations.classList.remove('visible');
                setTimeout(() => {
                    newsRecommendations.style.display = 'none';
                    
                    // 환영 화면 표시
                    welcomeView.style.display = 'flex';
                    setTimeout(() => {
                        welcomeView.style.opacity = '1';
                    }, 50);
                }, 300);
            }
        }
